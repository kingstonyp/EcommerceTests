name: Ejecucion Automatica de Pruebas QA

# 1. El Detonador: ¿Cuándo arranca la fábrica?
# Le decimos que corra cada vez que alguien empuje (push) código nuevo al repositorio.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # 2. El Entorno: Rentamos un servidor de Linux (Ubuntu) gratuito por unos minutos.
    runs-on: ubuntu-latest

    steps:
      # 3. La Receta: El servidor descarga nuestro código desde GitHub.
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v3

      # 4. El Horno: Instalamos la misma versión de Java que usamos localmente.
      - name: Configurar Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 5. Permisos: Le damos autorización al asistente Gradle para que pueda ejecutar comandos.
      - name: Dar permisos de ejecucion a Gradle
        run: chmod +x gradlew

      # 6. ¡La orden de trabajo!: Ejecutamos a nuestro Gerente (TestRunner) exactamente como lo hicimos en IntelliJ.
      - name: Ejecutar pruebas automatizadas
        run: ./gradlew test

      # 7. La Evidencia: Si algo falla o pasa, guardamos la carpeta de Allure para revisar los resultados después.
      - name: Guardar resultados de pruebas (Allure)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: build/allure-results